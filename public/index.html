<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Networked Uno - Lobby</title>
  <link rel="stylesheet" href="css/shared.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }
    


    .lobby-container {
      width: 100%;
      max-width: 440px;
      padding: 48px 36px;
      text-align: center;
      position: relative;
      margin: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    h1 {
      font-size: 2.6rem;
      margin-bottom: 8px;
      letter-spacing: -2px;
      font-weight: 900;
      background: linear-gradient(135deg, #ffffff 0%, #a1a1aa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 0.92rem;
      margin-bottom: 32px;
      letter-spacing: 0.5px;
    }

    .choice-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .join-form {
      display: none;
      flex-direction: column;
      gap: 20px;
      margin-top: 12px;
      text-align: left;
      animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input {
      font-family: var(--font-sans);
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.12);
      padding: 14px 16px;
      border-radius: 8px;
      color: white;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.25s ease;
    }

    input:focus {
      border-color: #ffffff;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.12);
      background: rgba(0, 0, 0, 0.6);
    }

    /* Avatar Grid selector */
    .avatar-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 4px;
    }

    .avatar-item {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      cursor: pointer;
      font-size: 1.6rem;
      height: 52px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .avatar-item:hover {
      border-color: rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.08);
      transform: scale(1.08);
    }

    .avatar-item.selected {
      background: rgba(255, 255, 255, 0.12);
      border-color: #ffffff;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.15);
      transform: scale(1.08);
    }

    .btn-back {
      margin-top: 14px;
      background: transparent;
      color: var(--text-secondary);
      border: none;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      align-self: center;
      transition: color 0.2s;
    }
    
    .btn-back:hover {
      color: white;
    }

    .error-msg {
      color: var(--clr-red);
      font-size: 0.82rem;
      font-weight: 600;
      margin-top: -6px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="glow-orb orb-1"></div>
  <div class="glow-orb orb-2"></div>
  <div class="glow-orb orb-3"></div>

  <div class="glass-panel lobby-container">
    <h1 class="text-shimmer">UNO CONNECT</h1>
    <p class="subtitle">Real-time network multiplayer</p>
    
    <div class="choice-group" id="choiceGroup">
      <button class="btn btn-primary" id="btnHostChoice">Host Central Table</button>
      <button class="btn btn-secondary" id="btnJoinChoice">Join Game Board</button>
    </div>

    <div class="join-form" id="joinForm">
      <div class="form-group">
        <label for="playerName">Your Name</label>
        <input type="text" id="playerName" placeholder="Enter name (e.g. Alice)" maxlength="12">
      </div>

      <div class="form-group">
        <label for="roomCode">Room Code</label>
        <input type="text" id="roomCode" placeholder="Enter 4-letter host code" maxlength="4" style="text-transform: uppercase;">
      </div>

      <div class="form-group">
        <label>Choose Avatar</label>
        <div class="avatar-grid" id="avatarGrid">
          <!-- Avatars populated by JS -->
        </div>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <button class="btn btn-primary" id="btnSubmitJoin">Join Room</button>
      <button class="btn-back" id="btnBack">← Choose another option</button>
    </div>
  </div>

  <!-- Socket.io -->
  <script src="/socket.io/socket.io.js"></script>
  <script>
    // Retrieve previous session details if returning from a room
    const prevName = sessionStorage.getItem('uno_playerName');
    const prevRoom = sessionStorage.getItem('uno_roomCode');
    const prevAvatar = sessionStorage.getItem('uno_playerAvatar');

    const avatars = ['🦖', '🦊', '🐯', '🦁', '🐼', '🐨', '🦄', '🐙', '👽', '🤖', '👻', '🦥'];
    let selectedAvatar = prevAvatar || avatars[0];

    const choiceGroup = document.getElementById('choiceGroup');
    const joinForm = document.getElementById('joinForm');
    const avatarGrid = document.getElementById('avatarGrid');
    const errorMsg = document.getElementById('errorMsg');

    // Populate Avatars
    avatars.forEach((av, i) => {
      const div = document.createElement('div');
      const isSelected = prevAvatar ? (av === prevAvatar) : (i === 0);
      div.className = `avatar-item ${isSelected ? 'selected' : ''}`;
      div.innerText = av;
      div.addEventListener('click', () => {
        document.querySelectorAll('.avatar-item').forEach(item => item.classList.remove('selected'));
        div.classList.add('selected');
        selectedAvatar = av;
      });
      avatarGrid.appendChild(div);
    });

    // Prefill form if returning from an active room
    if (prevName && prevRoom) {
      choiceGroup.style.display = 'none';
      joinForm.style.display = 'flex';
      errorMsg.style.display = 'none';
      document.getElementById('playerName').value = prevName;
      document.getElementById('roomCode').value = prevRoom;
    } else {
      sessionStorage.clear();
    }

    // Option Toggles
    document.getElementById('btnHostChoice').addEventListener('click', () => {
      sessionStorage.setItem('uno_isHost', 'true');
      window.location.href = '/host.html';
    });

    document.getElementById('btnJoinChoice').addEventListener('click', () => {
      choiceGroup.style.display = 'none';
      joinForm.style.display = 'flex';
      errorMsg.style.display = 'none';
    });

    document.getElementById('btnBack').addEventListener('click', () => {
      choiceGroup.style.display = 'flex';
      joinForm.style.display = 'none';
      sessionStorage.clear(); // Clear session details so they can connect as a different player
    });

    // Form Submit Join
    document.getElementById('btnSubmitJoin').addEventListener('click', () => {
      const name = document.getElementById('playerName').value.trim();
      const code = document.getElementById('roomCode').value.trim().toUpperCase();

      if (!name) {
        showError('Please enter your name.');
        return;
      }
      if (!code || code.length !== 4) {
        showError('Please enter a valid 4-letter room code.');
        return;
      }

      sessionStorage.setItem('uno_roomCode', code);
      sessionStorage.setItem('uno_playerName', name);
      sessionStorage.setItem('uno_playerAvatar', selectedAvatar);
      sessionStorage.setItem('uno_isHost', 'false');
      window.location.href = '/player.html';
    });

    function showError(msg) {
      errorMsg.innerText = msg;
      errorMsg.style.display = 'block';
    }
  </script>
  <!-- Credits Floater -->
  <div class="creator-credits text-shimmer">Created by Nithin</div>
</body>
</html>
